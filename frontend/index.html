<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltX - Finanças</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header class="dashboard-header">
            <div>
                <h2>Resumo: <span id="mes-atual">Abril/2026</span></h2>
                <p>Data Atual: <span id="data-atual">-</span></p>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <p>Dias Úteis Totais</p>
                    <h3 id="dias-uteis-totais">0</h3>
                </div>
                <div class="stat-card">
                    <p>Feriados no Mês</p>
                    <h3 id="feriados-mes">0</h3>
                </div>
                <div class="stat-card">
                    <p>Dias Restantes</p>
                    <h3 id="dias-restantes">0</h3>
                </div>
            </div>
        </header>

        <section class="form-section">
            <h3>Adicionar Lançamento</h3>
            <form id="form-transacao">
                <select id="tipo" required>
                    <option value="receita">Receita (+)</option>
                    <option value="despesa">Despesa (-)</option>
                </select>
                <input type="text" id="descricao" placeholder="Descrição (ex: Conta de Luz)" required>
                <input type="number" id="valor" placeholder="Valor (R$)" step="0.01" required>
                <input type="date" id="data" required>
                <input type="text" id="categoria" placeholder="Categoria (ex: Gastos Fixos)" required>
                <button type="submit">Salvar</button>
            </form>
        </section>

        <section class="charts-section">
            <div class="chart-container">
                <h3>Balanço do Mês (Receitas vs Despesas)</h3>
                <canvas id="pizzaChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Evolução Semanal</h3>
                <canvas id="barrasChart"></canvas>
            </div>
        </section>
    </div>

    <script src="js/app.js"></script>
    <script src="js/charts.js"></script>
</body>
</html>
